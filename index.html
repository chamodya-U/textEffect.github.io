<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Effects Showcase</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: #111;
        color: white;
        font-family: Arial, sans-serif;
      }

      header {
        height: 70px;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #000;
      }

      .effects {
        display: grid;
        grid-template-rows: repeat(5, 1fr);
        gap: 20px;
        padding: 20px;
      }

      .effect-box {
        background: #222;
        border-radius: 10px;
        overflow: hidden;
        height: 300px;
      }

      iframe {
        width: 100%;
        height: 100%;
        border: none;
      }

      @media (max-width: 900px) {
        .effects {
          grid-template-columns: repeat(2, 1fr);
        }
      }

      @media (max-width: 500px) {
        .effects {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>

  <body>
    <header>
      <h1>CSS Effects Gallery</h1>
    </header>

    <div class="effects">
      <div class="effect-box">
        <iframe src="effect1/effect1.html"></iframe>
      </div>

      <div class="effect-box">
        <iframe src="effect2/effect2.html"></iframe>
      </div>

      <div class="effect-box">
        <iframe src="effect3/effect3.html"></iframe>
      </div>

      <div class="effect-box">
        <iframe src="effect4/effect4.html"></iframe>
      </div>

      <div class="effect-box">
        <iframe src="effect5/effect5.html"></iframe>
      </div>
    </div>
  </body>
</html>
